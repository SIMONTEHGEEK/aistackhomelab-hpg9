# =============================================================================
# Test Override — Strips GPU requirements for CPU-only testing
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
# =============================================================================
# This override:
#  - Removes all GPU/NVIDIA reservations
#  - Replaces GPU containers with lightweight test stubs where needed
#  - Allows the full stack to spin up on any machine with Docker
# =============================================================================

services:

  ollama:
    deploy:
      resources:
        reservations:
          devices: []
    environment:
      - NVIDIA_VISIBLE_DEVICES=  # Clear GPU binding
      - OLLAMA_HOST=0.0.0.0

  open-webui:
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

  comfyui:
    # Replace with a simple HTTP stub for integration testing
    image: caddy:2-alpine
    deploy:
      resources:
        reservations:
          devices: []
    environment:
      - NVIDIA_VISIBLE_DEVICES=
    entrypoint: ["caddy", "respond", "--listen", ":8188", "ComfyUI test stub OK", "200"]
    volumes: []

  whisper:
    # Replace with a simple HTTP stub for integration testing
    image: caddy:2-alpine
    deploy:
      resources:
        reservations:
          devices: []
    environment:
      - NVIDIA_VISIBLE_DEVICES=
    entrypoint: ["caddy", "respond", "--listen", ":8000", "{\"text\":\"whisper test stub\"}", "200"]
    volumes: []

  piper:
    # Replace with a simple HTTP stub for integration testing
    image: caddy:2-alpine
    entrypoint: ["caddy", "respond", "--listen", ":8000", "Piper test stub OK", "200"]
    volumes: []
